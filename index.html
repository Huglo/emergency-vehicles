<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Vehicles of the World</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:,">
<meta name="theme-color" content="#f5f6f8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f5f6f8;
    --surface:   #ffffff;
    --surface2:  #e8eaed;
    --border:    #d1d5db;
    --amber:     #e08d00;
    --text:      #111827;
    --muted:     #6b7280;
    --ambulance: #dc2626;
    --fire:      #d97706;
    --police:    #2563eb;
    --radius:    16px;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  .screen {
    display: none;
    min-height: 100dvh;
    padding: 0 0 40px;
    animation: fadeIn .22s ease;
  }
  .screen.active { display: flex; flex-direction: column; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ── Loading ── */
  #screen-loading {
    align-items: center; justify-content: center; gap: 20px;
    font-family: 'Nunito', sans-serif; font-size: 1rem; color: var(--muted);
  }
  .loader-ring {
    width: 52px; height: 52px;
    border: 3px solid var(--surface2); border-top-color: var(--amber);
    border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Top bar ── */
  .top-bar {
    display: flex; align-items: center; gap: 12px; padding: 18px 18px 0;
  }
  .back-btn {
    background: var(--surface2); border: none; color: var(--text);
    width: 52px; height: 52px; border-radius: 50%; font-size: 1.5rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .15s; -webkit-tap-highlight-color: transparent;
  }
  .back-btn:active { background: var(--border); }
  .top-bar-title {
    font-family: 'Nunito', sans-serif; font-size: .95rem; font-weight: 800;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; color: var(--text);
  }

  /* ── Day strip ── */
  .day-strip-row {
    display: flex; align-items: center; gap: 8px; padding: 18px 16px 0;
  }
  .day-strip-wrap {
    flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .day-strip-wrap::-webkit-scrollbar { display: none; }
  .day-strip { display: flex; gap: 8px; width: max-content; }
  .day-pill {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    padding: 8px 14px; border-radius: 99px; background: var(--surface);
    border: 1.5px solid var(--border); cursor: pointer;
    transition: background .15s, border-color .15s;
    -webkit-tap-highlight-color: transparent; min-width: 56px; min-height: 52px;
  }
  .day-pill:active { background: var(--surface2); }
  .day-pill.active { background: var(--amber); border-color: var(--amber); }
  .day-pill.active .pill-day,
  .day-pill.active .pill-date { color: #fff; }
  .pill-day {
    font-size: .65rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: .05em; color: var(--muted);
  }
  .pill-date {
    font-family: 'Nunito', sans-serif; font-size: .95rem;
    font-weight: 800; color: var(--text);
  }
  .tomorrow-btn {
    flex-shrink: 0; background: var(--surface); border: 1.5px solid var(--border);
    color: var(--amber); font-family: 'Nunito', sans-serif; font-size: .78rem;
    font-weight: 800; padding: 8px 14px; border-radius: 99px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    min-height: 52px; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent; transition: background .15s; white-space: nowrap;
  }
  .tomorrow-btn:active { background: var(--surface2); }

  /* ── Country hero ── */
  .country-hero {
    display: flex; flex-direction: column; align-items: center; padding: 24px 24px 20px;
  }
  .country-flag-emoji { font-size: 5rem; line-height: 1; margin-bottom: 16px; }
  .country-name {
    font-family: 'Nunito', sans-serif; font-size: 2rem; font-weight: 900;
    text-align: center; line-height: 1.1; margin-bottom: 4px; color: var(--text);
  }
  .date-label {
    font-size: .75rem; color: var(--muted); letter-spacing: .06em;
    text-transform: uppercase; margin-bottom: 16px;
  }
  .capital-label {
    font-size: .82rem; color: var(--muted); margin-bottom: 6px;
  }
  .capital-label::before { content: "🏛 "; }

  /* ── Map ── */
  .map-container {
    width: calc(100% - 36px); margin: 0 18px;
    height: 180px; border-radius: var(--radius);
    overflow: hidden; border: 1.5px solid var(--border);
    position: relative;
  }
  #country-map, #tomorrow-map { width: 100%; height: 100%; }
  .leaflet-container { background: var(--surface2) !important; }
  .leaflet-control-attribution { display: none !important; }
  .leaflet-control-zoom { display: none !important; }
  /* Zoom level buttons overlaid on map */
  .map-zoom-ctrl {
    position: absolute; bottom: 8px; right: 8px; z-index: 1000;
    display: flex; gap: 3px;
    background: rgba(255,255,255,.88); border-radius: 8px;
    padding: 3px; box-shadow: 0 1px 4px rgba(0,0,0,.15);
  }
  .map-zoom-btn {
    border: none; background: transparent; cursor: pointer;
    font-size: .65rem; font-family: 'Nunito', sans-serif; font-weight: 800;
    color: var(--muted); padding: 4px 7px; border-radius: 6px;
    -webkit-tap-highlight-color: transparent; transition: background .12s, color .12s;
    line-height: 1;
  }
  .map-zoom-btn.active { background: var(--amber); color: #fff; }
  .map-zoom-btn:active { opacity: .75; }

  /* ── Vehicle cards ── */
  .vehicle-cards { width: 100%; display: flex; flex-direction: column; gap: 11px; padding: 16px 18px 0; }
  .vehicle-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 18px; display: flex; align-items: center;
    gap: 16px; cursor: pointer; transition: border-color .15s, background .15s;
    -webkit-tap-highlight-color: transparent; position: relative; overflow: hidden;
  }
  .vehicle-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; border-radius: 4px 0 0 4px;
  }
  .vehicle-card.ambulance::before { background: var(--ambulance); }
  .vehicle-card.fire::before      { background: var(--fire); }
  .vehicle-card.police::before    { background: var(--police); }
  .vehicle-card:active { background: var(--surface2); }
  .vehicle-icon { font-size: 2rem; flex-shrink: 0; }
  .vehicle-card-info { flex: 1; }
  .vehicle-card-label { font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800; color: var(--text); }
  .vehicle-card-arrow { color: var(--muted); font-size: 1.1rem; }

  /* ── Gallery ── */
  .gallery-meta { padding: 12px 18px 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .type-switcher { display: flex; gap: 8px; flex-wrap: wrap; }
  .type-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 13px; border-radius: 99px;
    font-size: .78rem; font-weight: 700;
    border: 1.5px solid transparent;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: opacity .15s, border-color .15s;
    opacity: .5;
  }
  .type-pill.current { opacity: 1; border-color: currentColor; }
  .type-pill:active { opacity: .8; }
  .type-pill.ambulance { background: rgba(220,38,38,.1); color: var(--ambulance); }
  .type-pill.fire      { background: rgba(217,119,6,.1); color: var(--fire); }
  .type-pill.police    { background: rgba(37,99,235,.1); color: var(--police); }
  .gallery-title-block { padding: 0 18px 16px; }
  .gallery-title-block h2 {
    font-family: 'Nunito', sans-serif; font-size: 1.45rem; font-weight: 900; line-height: 1.15; color: var(--text);
  }
  .image-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; padding: 0 14px; }
  .image-thumb {
    aspect-ratio: 4/3; border-radius: 12px; overflow: hidden;
    cursor: zoom-in; background: var(--surface2);
  }
  .image-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .18s; }
  .image-thumb:active img { transform: scale(.96); }
  .thumb-skeleton {
    aspect-ratio: 4/3; border-radius: 12px;
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%; animation: shimmer 1.3s infinite;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .img-error {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 5px; color: var(--muted); font-size: .68rem; text-align: center; padding: 8px;
  }
  .no-results { grid-column: 1/-1; text-align: center; padding: 40px 24px; color: var(--muted); }
  .no-results .emoji { font-size: 2.2rem; margin-bottom: 10px; }

  /* ── Lightbox with swipe ── */
  #lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.93); z-index: 999;
    flex-direction: column; animation: fadeIn .16s ease;
  }
  #lightbox.open { display: flex; }
  .lb-top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 18px 8px; flex-shrink: 0;
  }
  .lb-counter {
    font-family: 'Nunito', sans-serif; font-size: .9rem; font-weight: 700; color: rgba(255,255,255,.7);
  }
  /* Swipe area */
  .lb-swipe-area {
    flex: 1; position: relative; overflow: hidden; min-height: 0;
    touch-action: pan-y pinch-zoom; /* allow vertical scroll & pinch, intercept horizontal in JS */
    cursor: zoom-out;
  }
  /* Track holds all images side by side */
  .lb-track {
    display: flex; height: 100%;
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    will-change: transform;
  }
  .lb-slide {
    flex: 0 0 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 0 8px 16px;
    pointer-events: none; /* taps handled by swipe-area */
  }
  .lb-slide img {
    max-width: 100%; max-height: 100%;
    object-fit: contain; border-radius: 8px;
    user-select: none; -webkit-user-drag: none;
  }
  /* Dot indicators */
  .lb-dots {
    display: flex; justify-content: center; gap: 6px;
    padding: 8px 0 16px; flex-shrink: 0;
  }
  .lb-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,.3); transition: background .2s;
  }
  .lb-dot.active { background: #fff; }

  .attrib { text-align: center; font-size: .65rem; color: var(--muted); padding: 18px 16px 0; }
</style>
</head>

<div id="screen-loading" class="screen active">
  <div class="loader-ring"></div>
  <span>Loading…</span>
</div>

<div id="screen-country" class="screen">
  <div class="day-strip-row">
    <div class="day-strip-wrap">
      <div class="day-strip" id="day-strip"></div>
    </div>
    <button class="tomorrow-btn" onclick="goTomorrow()">Tomorrow ›</button>
  </div>
  <div class="country-hero">
    <div id="country-flag" class="country-flag-emoji"></div>
    <div class="country-name" id="country-name"></div>
    <div class="capital-label" id="capital-label"></div>
    <div class="date-label" id="date-label"></div>
  </div>
  <div class="map-container">
    <div id="country-map"></div>
    <div class="map-zoom-ctrl">
      <button class="map-zoom-btn" onclick="setMapZoom(2)" data-zoom="2">🌍</button>
      <button class="map-zoom-btn active" onclick="setMapZoom(4)" data-zoom="4">🗺</button>
      <button class="map-zoom-btn" onclick="setMapZoom(6)" data-zoom="6">📍</button>
    </div>
  </div>
  <div class="vehicle-cards">
    <div class="vehicle-card ambulance" onclick="goVehicle('ambulance')">
      <div class="vehicle-icon">🚑</div>
      <div class="vehicle-card-info">
        <div class="vehicle-card-label">Ambulance</div>
      </div>
      <div class="vehicle-card-arrow">›</div>
    </div>
    <div class="vehicle-card fire" onclick="goVehicle('fire')">
      <div class="vehicle-icon">🚒</div>
      <div class="vehicle-card-info">
        <div class="vehicle-card-label">Fire Engine</div>
      </div>
      <div class="vehicle-card-arrow">›</div>
    </div>
    <div class="vehicle-card police" onclick="goVehicle('police')">
      <div class="vehicle-icon">🚔</div>
      <div class="vehicle-card-info">
        <div class="vehicle-card-label">Police Car</div>
      </div>
      <div class="vehicle-card-arrow">›</div>
    </div>
  </div>
</div>

<div id="screen-gallery" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">‹</button>
    <span class="top-bar-title" id="gallery-country-name"></span>
  </div>
  <div class="gallery-meta">
    <div class="type-switcher" id="type-switcher"></div>
  </div>
  <div class="gallery-title-block"><h2 id="gallery-title"></h2></div>
  <div class="image-grid" id="image-grid"></div>

</div>

<div id="screen-tomorrow" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">‹</button>
    <span class="top-bar-title">Coming Tomorrow</span>
  </div>
  <div class="country-hero">
    <div id="tomorrow-flag" class="country-flag-emoji"></div>
    <div class="country-name" id="tomorrow-name"></div>
    <div class="capital-label" id="tomorrow-capital-label"></div>
    <div class="date-label" id="tomorrow-date"></div>
  </div>
  <div class="map-container">
    <div id="tomorrow-map"></div>
    <div class="map-zoom-ctrl">
      <button class="map-zoom-btn" onclick="setTomorrowMapZoom(2)" data-tzoom="2">🌍</button>
      <button class="map-zoom-btn active" onclick="setTomorrowMapZoom(4)" data-tzoom="4">🗺</button>
      <button class="map-zoom-btn" onclick="setTomorrowMapZoom(6)" data-tzoom="6">📍</button>
    </div>
  </div>
</div>

<!-- Lightbox with swipeable track -->
<div id="lightbox">
  <div class="lb-top-bar">
    <button class="back-btn" style="background:rgba(255,255,255,.15);color:#fff;" onclick="goBack()">‹</button>
    <span class="lb-counter" id="lb-counter"></span>
  </div>
  <div class="lb-swipe-area" id="lb-swipe-area" onclick="handleLightboxTap(event)">
    <div class="lb-track" id="lb-track"></div>
  </div>
  <div class="lb-dots" id="lb-dots"></div>
</div>

(function() {
  let startY = 0;
  document.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (e.touches[0].clientY - startY > 0 && window.scrollY === 0) e.preventDefault();

})();

const VEHICLE_CONFIG = {
  ambulance: { label: "Ambulance",   icon: "🚑", badge: "badge-ambulance", query: c => `${c} ambulance emergency vehicle` },
  fire:      { label: "Fire Engine", icon: "🚒", badge: "badge-fire",      query: c => `${c} fire engine truck brigade`   },
  police:    { label: "Police Car",  icon: "🚔", badge: "badge-police",    query: c => `${c} police car vehicle`          }
};

// ─────────────────────────────────────────────
// DATE UTILITIES
// ─────────────────────────────────────────────
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function startOfDay(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function daysBetween(a, b) { return Math.round((startOfDay(b) - startOfDay(a)) / 86400000); }
const EPOCH = new Date(2024, 0, 1);
function countryForDate(d) {
  const idx = daysBetween(EPOCH, d) % COUNTRIES.length;
  return COUNTRIES[(idx + COUNTRIES.length) % COUNTRIES.length];
}
function parseDateKey(str) { const [y,m,d] = str.split('-').map(Number); return new Date(y, m-1, d); }
function formatDateLong(d) {
  return d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}
function formatDayShort(d) { return d.toLocaleDateString('en-GB', { weekday:'short' }).toUpperCase(); }

// ─────────────────────────────────────────────
// CACHE (localStorage)
// ─────────────────────────────────────────────
const CACHE_PREFIX = 'ev_img_';
function cacheKey(dateStr, countryCode, vehicleType) { return `${CACHE_PREFIX}${dateStr}_${countryCode}_${vehicleType}`; }
function cacheGet(dateStr, countryCode, vehicleType) {
  try { const r = localStorage.getItem(cacheKey(dateStr, countryCode, vehicleType)); return r ? JSON.parse(r) : null; }
  catch(e) { return null; }
}
function cacheSet(dateStr, countryCode, vehicleType, data) {
  try { localStorage.setItem(cacheKey(dateStr, countryCode, vehicleType), JSON.stringify(data)); }
  catch(e) {
    try {
      const keys = Object.keys(localStorage).filter(k => k.startsWith(CACHE_PREFIX)).sort();
      keys.slice(0, Math.ceil(keys.length / 2)).forEach(k => localStorage.removeItem(k));
      localStorage.setItem(cacheKey(dateStr, countryCode, vehicleType), JSON.stringify(data));
    } catch(e2) {}
  }
}
function isCached(dateStr, cc, vt) { return cacheGet(dateStr, cc, vt) !== null; }

// ─────────────────────────────────────────────
// IMAGE FETCHING — static JSON first, Serper fallback
// ─────────────────────────────────────────────
async function fetchImages(vehicleType, countryName, dateStr, countryCode) {
  // 1. localStorage cache
  const cached = cacheGet(dateStr, countryCode, vehicleType);
  if (cached) return { images: cached, fromCache: true };

  // 2. Pre-fetched static JSON (generated by GitHub Action)
  try {
    const res = await fetch(`/data/${dateStr}.json`);
    if (res.ok) {
      const json = await res.json();
      const key = `${countryCode}_${vehicleType}`;
      if (json[key] && json[key].length > 0) {
        cacheSet(dateStr, countryCode, vehicleType, json[key]);
        // Also cache the other vehicle types from the same file
        for (const vt of ['ambulance','fire','police']) {
          const k = `${countryCode}_${vt}`;
          if (json[k] && !isCached(dateStr, countryCode, vt)) {
            cacheSet(dateStr, countryCode, vt, json[k]);
          }
        }
        return { images: json[key], fromCache: false };
      }
    }
  } catch(e) { /* fall through to Serper */ }

  // 3. Live Serper call
  const query = VEHICLE_CONFIG[vehicleType].query(countryName);
  const res2 = await fetch('https://google.serper.dev/images', {
    method: 'POST',
    headers: { 'X-API-KEY': SERPER_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ q: query, num: 9, gl: 'us', hl: 'en' })
  });
  if (!res2.ok) throw new Error(`Serper HTTP ${res2.status}`);
  const data = await res2.json();
  const images = (data.images || [])
    .map(img => {
      const thumb = img.thumbnailUrl || img.imageUrl;
      // encrypted-tbn0 URLs only work as thumbnails — use thumb for both
      // to avoid broken full-size loads
      const isGoogleThumb = img.imageUrl && img.imageUrl.includes('encrypted-tbn');
      const full = isGoogleThumb ? thumb : (img.imageUrl || thumb);
      return { thumb, full };
    })
    .filter(img => img.full)
    .slice(0, 6);
  if (images.length > 0) cacheSet(dateStr, countryCode, vehicleType, images);
  return { images, fromCache: false };
}

// ─────────────────────────────────────────────
// FLAG EMOJI
// ─────────────────────────────────────────────
function codeToFlagEmoji(code) {
  if (!code || code === 'xk') return '🏳️';
  const base = 0x1F1E6 - 'a'.charCodeAt(0);
  return [...code.toLowerCase()].map(c => String.fromCodePoint(base + c.charCodeAt(0))).join('');
}

// ─────────────────────────────────────────────
// MAP
// ─────────────────────────────────────────────
let countryMapInstance = null;
let tomorrowMapInstance = null;
let currentMapZoom = 4;
let currentTomorrowMapZoom = 4;

function renderMap(containerId, country, mapRef, zoom) {
  if (mapRef && mapRef.remove) mapRef.remove();
  const el = document.getElementById(containerId);
  delete el._leaflet_id;
  const map = L.map(containerId, {
    center: [country.capLat, country.capLng], zoom: zoom || currentMapZoom,
    zoomControl: false, attributionControl: false,
    dragging: false, touchZoom: false,
    scrollWheelZoom: false, doubleClickZoom: false,
    boxZoom: false, keyboard: false
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
  L.circleMarker([country.capLat, country.capLng], {
    radius: 7, color: '#fff', weight: 2,
    fillColor: '#e08d00', fillOpacity: 1
  }).addTo(map);
  return map;
}

function setMapZoom(zoom) {
  currentMapZoom = zoom;
  document.querySelectorAll('.map-zoom-btn[data-zoom]').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.zoom) === zoom);
  });
  if (selectedCountry) {
    countryMapInstance = renderMap('country-map', selectedCountry, countryMapInstance, zoom);
  }
}

function setTomorrowMapZoom(zoom) {
  currentTomorrowMapZoom = zoom;
  document.querySelectorAll('.map-zoom-btn[data-tzoom]').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.tzoom) === zoom);
  });
  const t = new Date(startOfDay(new Date())); t.setDate(t.getDate() + 1);
  const c = countryForDate(t);
  tomorrowMapInstance = renderMap('tomorrow-map', c, tomorrowMapInstance, zoom);
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let selectedDate       = startOfDay(new Date());
let selectedCountry    = null;
let currentVehicleType = null;
let lightboxImages     = [];
let lightboxIndex      = 0;

// ─────────────────────────────────────────────
// DAY STRIP  (oldest left → today right)
// ─────────────────────────────────────────────
function buildDayStrip() {
  const today = startOfDay(new Date());
  const strip = document.getElementById('day-strip');
  strip.innerHTML = '';
  const days = [];
  for (let i = MAX_DAYS_BACK; i >= 0; i--) {
    const d = new Date(today); d.setDate(today.getDate() - i);
    if (d < LAUNCH_DATE) continue;
    days.push(d);
  }
  days.forEach(d => {
    const isToday = daysBetween(d, today) === 0;
    const pill = document.createElement('div');
    pill.className = 'day-pill' + (isToday ? ' active' : '');
    pill.dataset.datekey = dateKey(d);
    pill.innerHTML = `<span class="pill-day">${isToday ? 'Today' : formatDayShort(d)}</span>
                      <span class="pill-date">${d.getDate()}</span>`;
    pill.onclick = () => { location.hash = 'day-' + dateKey(d); };
    strip.appendChild(pill);
  });
  setTimeout(() => {
    const active = strip.querySelector('.day-pill.active');
    if (active) active.scrollIntoView({ inline: 'end', block: 'nearest' });
  }, 50);
}

function activateDayPill(dkStr) {
  document.querySelectorAll('.day-pill').forEach(p => p.classList.toggle('active', p.dataset.datekey === dkStr));
}

// ─────────────────────────────────────────────
// COUNTRY SCREEN
// ─────────────────────────────────────────────
function renderCountryScreen() {
  const c = selectedCountry;
  document.getElementById('country-flag').textContent = codeToFlagEmoji(c.code);
  document.getElementById('country-name').textContent = c.name;
  document.getElementById('capital-label').textContent = c.capital;
  document.getElementById('date-label').textContent = formatDateLong(selectedDate);
  setTimeout(() => { countryMapInstance = renderMap('country-map', c, countryMapInstance, currentMapZoom); }, 50);
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goVehicle(type) { currentVehicleType = type; location.hash = type; }
function goTomorrow() { location.hash = 'tomorrow'; }
function goBack() { history.back(); }

async function handleHash() {
  const hash = location.hash.replace('#','');
  if (hash.startsWith('day-')) {
    const dkStr = hash.slice(4);
    selectedDate = parseDateKey(dkStr);
    selectedCountry = countryForDate(selectedDate);
    activateDayPill(dkStr);
    renderCountryScreen();
    showScreen('screen-country');
    return;
  }
  if (!hash || hash === 'home') {
    selectedDate = startOfDay(new Date());
    selectedCountry = countryForDate(selectedDate);
    activateDayPill(dateKey(selectedDate));
    renderCountryScreen();
    showScreen('screen-country');
    return;
  }
  if (hash === 'tomorrow') { openTomorrow(); return; }
  if (hash === 'lightbox') return;
  if (['ambulance','fire','police'].includes(hash)) { currentVehicleType = hash; await openGallery(hash); }
}
window.addEventListener('hashchange', handleHash);

// ─────────────────────────────────────────────
// TOMORROW
// ─────────────────────────────────────────────
function openTomorrow() {
  const t = new Date(startOfDay(new Date())); t.setDate(t.getDate() + 1);
  const c = countryForDate(t);
  document.getElementById('tomorrow-flag').textContent = codeToFlagEmoji(c.code);
  document.getElementById('tomorrow-name').textContent = c.name;
  document.getElementById('tomorrow-capital-label').textContent = c.capital;
  document.getElementById('tomorrow-date').textContent = formatDateLong(t);
  showScreen('screen-tomorrow');
  setTimeout(() => { tomorrowMapInstance = renderMap('tomorrow-map', c, tomorrowMapInstance, currentTomorrowMapZoom); }, 50);
}

// ─────────────────────────────────────────────
// GALLERY
// ─────────────────────────────────────────────
async function openGallery(type) {
  const cfg = VEHICLE_CONFIG[type], c = selectedCountry, ds = dateKey(selectedDate);
  document.getElementById('gallery-country-name').textContent = c.name;
  document.getElementById('gallery-title').textContent = `${cfg.label} in ${c.name}`;

  // Build the type switcher: the "current type" indicator IS the navigation control.
  // All 3 types shown as pills; the active one is highlighted, the other two are
  // tappable shortcuts straight to that gallery.
  const switcher = document.getElementById('type-switcher');
  switcher.innerHTML = '';
  Object.entries(VEHICLE_CONFIG).forEach(([key, vcfg]) => {
    const pill = document.createElement('button');
    pill.className = `type-pill ${key}` + (key === type ? ' current' : '');
    pill.innerHTML = `${vcfg.icon} ${vcfg.label}`;
    pill.onclick = () => { if (key !== type) switchVehicle(key); };
    switcher.appendChild(pill);
  });

  showScreen('screen-gallery');
  const grid = document.getElementById('image-grid');
  grid.innerHTML = Array(6).fill('<div class="thumb-skeleton"></div>').join('');
  try {
    const { images } = await fetchImages(type, c.name, ds, c.code);
    if (!images.length) {
      grid.innerHTML = `<div class="no-results"><div class="emoji">🔍</div><div>No images found for ${c.name}.</div></div>`;
      return;
    }
    grid.innerHTML = '';
    images.slice(0,6).forEach((img, i) => {
      const div = document.createElement('div');
      div.className = 'image-thumb';
      div.onclick = () => openLightbox(images, i);
      const image = document.createElement('img');
      image.alt = `${cfg.label} in ${c.name}`; image.loading = 'lazy';
      image.onerror = () => { div.innerHTML = `<div class="img-error">⚠️<br>Unavailable</div>`; };
      image.src = img.thumb || img.full;
      div.appendChild(image); grid.appendChild(div);
    });
  } catch(err) {
    grid.innerHTML = `<div class="no-results"><div class="emoji">⚠️</div><div>Could not load images.<br><small>${err.message}</small></div></div>`;
  }
}

// Switch vehicle type in-place without adding a new history entry
// (so the back button still returns to the country screen, not through each type)
function switchVehicle(type) {
  currentVehicleType = type;
  history.replaceState(null, '', '#' + type);
  openGallery(type);
}

// ─────────────────────────────────────────────
// LIGHTBOX  with swipe
// ─────────────────────────────────────────────
function openLightbox(images, startIndex) {
  lightboxImages = images;
  lightboxIndex  = startIndex;

  // Build slides
  const track = document.getElementById('lb-track');
  track.innerHTML = '';
  images.forEach(img => {
    const slide = document.createElement('div');
    slide.className = 'lb-slide';
    const el = document.createElement('img');
    el.src = img.full; el.alt = '';
    slide.appendChild(el);
    track.appendChild(slide);
  });

  // Build dots
  const dotsEl = document.getElementById('lb-dots');
  dotsEl.innerHTML = '';
  images.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'lb-dot' + (i === startIndex ? ' active' : '');
    dotsEl.appendChild(dot);
  });

  updateLightboxPosition(false);
  document.getElementById('lightbox').classList.add('open');
  history.pushState({ lightbox: true }, '', '#lightbox');
}

function updateLightboxPosition(animate) {
  const track = document.getElementById('lb-track');
  track.style.transition = animate ? 'transform .28s cubic-bezier(.4,0,.2,1)' : 'none';
  track.style.transform = `translateX(${-lightboxIndex * 100}%)`;
  document.getElementById('lb-counter').textContent = `${lightboxIndex + 1} / ${lightboxImages.length}`;
  document.querySelectorAll('.lb-dot').forEach((d, i) => d.classList.toggle('active', i === lightboxIndex));
}

function lightboxGo(delta) {
  const next = lightboxIndex + delta;
  if (next < 0 || next >= lightboxImages.length) return;
  lightboxIndex = next;
  updateLightboxPosition(true);
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  lb.classList.remove('open');
  if (location.hash === '#lightbox') history.back();
}

// Tap left/right halves to navigate; tap centre column to close
function handleLightboxTap(e) {
  const w = e.currentTarget.clientWidth;
  const x = e.clientX;
  const zone = w * 0.28; // 28% on each side = navigation zones
  if (x < zone)       { lightboxGo(-1); }
  else if (x > w - zone) { lightboxGo(1); }
  else                { closeLightbox(); }
}

// Swipe gesture
(function() {
  let startX = 0, startY = 0, dragging = false;
  const area = () => document.getElementById('lb-swipe-area');
  document.addEventListener('touchstart', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY; dragging = true;
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (!dragging || !document.getElementById('lightbox').classList.contains('open')) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy)) e.preventDefault(); // horizontal swipe — block scroll
  }, { passive: false });
  document.addEventListener('touchend', e => {
    if (!dragging || !document.getElementById('lightbox').classList.contains('open')) return;
    dragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) dx < 0 ? lightboxGo(1) : lightboxGo(-1);
  }, { passive: true });
})();

window.addEventListener('popstate', () => {
  const lb = document.getElementById('lightbox');
  if (lb.classList.contains('open') && location.hash !== '#lightbox') lb.classList.remove('open');
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
  selectedDate    = startOfDay(new Date());
  selectedCountry = countryForDate(selectedDate);
  buildDayStrip();
  renderCountryScreen();
  if (!location.hash || location.hash === '#') history.replaceState(null, '', '#home');
  showScreen('screen-country');
  const hash = location.hash.replace('#','');
  if (['ambulance','fire','police'].includes(hash)) { currentVehicleType = hash; openGallery(hash); }
}
init();
</script>
