name: Fetch daily images

on:
  schedule:
    # Runs at 05:00 UTC every day (well before anyone wakes up)
    - cron: '0 5 * * *'
  # Allows manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the JSON file back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch today's images
        env:
          # GitHub reads this from the repo's Secrets — never written in plain text
          SERPER_KEY: ${{ secrets.SERPER_KEY }}
        run: node scripts/fetch-today.js

      - name: Commit and push JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there is actually something new
          git diff --cached --quiet || git commit -m "chore: daily image data $(date -u +%Y-%m-%d)"
          git push
